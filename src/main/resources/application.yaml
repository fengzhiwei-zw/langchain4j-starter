spring:
  application:
    name: langchain4j-starter

ai:
  dash-scope:
    api-key: ${DASHSCOPE_API_KEY}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    image-url: https://dashscope.aliyuncs.com/api/v1
    stream-model-name: qwen3-8b
    model-name: qwen3.6-plus
    image-model-name: wan2.7-image-pro

# LangChain4j 配置（通过 Starter 自动注入）
langchain4j:
  open-ai:
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v4   # 推荐从低成本模型开始
      dimensions: 1024
    chat-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen3.6-plus   # 推荐从低成本模型开始
      temperature: 0.7
      max-tokens: 1000
      max-retries: 2
#      logRequests: true
#      logResponses: true
    streaming-chat-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen3-8b
      temperature: 0.7
      max-tokens: 1000
      max-retries: 2
    image-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/api/v1
      model-name: wan2.7-image   # 推荐从低成本模型开始

# 如果使用 Ollama（本地模型，零 API 成本）：
# ollama:
#   chat-model:
#     base-url: http://localhost:11434
#     model-name: qwen2.5:14b   # 或 llama3.2 等

logging:
  level:
    # 如果你使用的是 SpringRestClient，开启这个可以看到具体的 HTTP 请求路径
    org.springframework.web: INFO
    dev:
      langchain4j: INFO
