spring:
  application:
    name: langchain4j-starter
  output:
    ansi:
      enabled: always
  datasource:
    # 替换为你创建的数据库 ai_mysql
    url: jdbc:mysql://127.0.0.1:3306/ai_mysql?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8&characterEncoding=utf-8
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    # 生产环境建议设为 validate 或 none
    hibernate:
      ddl-auto: update
    show-sql: true
  Jackson:
    # 设置日期格式
    date-format: yyyy-MM-dd HH:mm:ss
    # 强制不使用时间戳
    serialization:
      write-dates-as-timestamps: false
    # 确保时区匹配
    time-zone: GMT+8

ai:
  dash-scope:
    api-key: ${DASHSCOPE_API_KEY}
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    image-url: https://dashscope.aliyuncs.com/api/v1
    stream-model-name: qwen3-8b
    model-name: qwen3.6-plus
    image-model-name: wan2.7-image-pro
  default:
    password: ${DEFAULT_PASSWORD}

# LangChain4j 配置（通过 Starter 自动注入，也可通过@Configuration配置，更灵活）
langchain4j:
  open-ai:
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: text-embedding-v4   # 推荐从低成本模型开始
      dimensions: 1024
    chat-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen3.6-plus   # 推荐从低成本模型开始
      temperature: 0.7
      max-tokens: 1000
      max-retries: 2
#      logRequests: true
#      logResponses: true
    streaming-chat-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model-name: qwen3-8b
      temperature: 0.7
      max-tokens: 1000
      max-retries: 2
    image-model:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/api/v1
      model-name: wan2.7-image   # 推荐从低成本模型开始

# 如果使用 Ollama（本地模型，零 API 成本）：
# ollama:
#   chat-model:
#     base-url: http://localhost:11434
#     model-name: qwen2.5:14b   # 或 llama3.2 等

logging:
  level:
    # 如果你使用的是 SpringRestClient，开启这个可以看到具体的 HTTP 请求路径
    org.springframework.web: INFO
    dev:
      langchain4j: INFO
