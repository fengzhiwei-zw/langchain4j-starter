<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login</title>

    <style>
        /* =========================
           1. 主题变量（核心）
        ========================== */

        :root {
            --bg: #f5f6f8;
            --card: #ffffff;
            --text: #111;
            --primary: #4f46e5;
            --border: #ddd;
            --input-bg: #fff;
        }

        /* 🌙 自动深色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e293b;
                --text: #e2e8f0;
                --primary: #6366f1;
                --border: #334155;
                --input-bg: #0b1220;
            }
        }

        /* =========================
           2. 页面布局
        ========================== */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 360px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .tip {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>系统登录</h2>

    <div class="input-group">
        <input id="username" placeholder="用户名" />
    </div>

    <div class="input-group">
        <input id="password" type="password" placeholder="密码" />
    </div>

    <button onclick="login()">登录</button>

    <div class="tip">自动跟随系统深色 / 浅色主题</div>
</div>

<script>
    async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        await fetch("/login", {
                method: "POST",
                headers: {
                    // "Content-Type": "application/json"
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                // body: JSON.stringify({ username, password }),
                body: new URLSearchParams({
                    username,
                    password
                }),
                credentials: "include"   // 🔥关键
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    alert(data.msg);
                    window.location.href = "/index.html"; // 跳转登录页
                } else {
                    alert(data.msg);
                }
            })
            .catch(err => {
                console.error(err);
            });
    }
</script>

</body>
</html>
